{% extends "base.html" %}
{% block content %}
{% include "_settings_nav.html" %}
<div class="settings-stack"><section class="card"><div class="card-body"><form method="post" action="/settings/interface" class="form-grid"><label>{{ t("admin_language") }}<select class="form-select" name="locale">{% for code, name in locales.items() %}<option value="{{ code }}" {{ 'selected' if interface_settings.locale == code }}>{{ name }}</option>{% endfor %}</select></label><label>{{ t("theme") }}<select class="form-select" name="theme">{% for theme in ("system","light","dark","black") %}<option value="{{ theme }}" {{ 'selected' if interface_settings.theme == theme }}>{{ t("theme_" ~ theme) }}</option>{% endfor %}</select></label><label>{{ t("density") }}<select class="form-select" name="density"><option value="comfortable" {{ 'selected' if interface_settings.density == 'comfortable' }}>{{ t("comfortable") }}</option><option value="compact" {{ 'selected' if interface_settings.density == 'compact' }}>{{ t("compact") }}</option></select></label><label>{{ t("display_timezone") }}<select class="form-select" name="display_timezone_mode" data-timezone-mode><option value="browser" {{ 'selected' if interface_settings.display_timezone == 'browser' }}>{{ t("timezone_browser") }}</option><option value="owner" {{ 'selected' if interface_settings.display_timezone == 'owner' }}>{{ t("timezone_owner", timezone=owner_timezone) }}</option><option value="named" {{ 'selected' if interface_settings.display_timezone not in ('browser','owner') }}>{{ t("timezone_named") }}</option></select></label><label class="full" data-named-timezone>{{ t("named_timezone") }}<input class="form-control" name="named_timezone" value="{{ interface_settings.display_timezone if interface_settings.display_timezone not in ('browser','owner') else owner_timezone }}" placeholder="Europe/Berlin"></label><label class="form-check full"><input class="form-check-input" type="checkbox" name="show_advanced_ids" {{ 'checked' if interface_settings.show_advanced_ids }}><span>{{ t("show_advanced_ids") }}</span></label><div class="full"><button class="btn btn-primary">{{ t("save") }}</button></div></form></div></section><section class="card border-danger"><div class="card-body"><h2 class="h5">{{ t("reset_interface_settings") }}</h2><form method="post" action="/settings/interface/reset"><label class="form-check"><input class="form-check-input" type="checkbox" name="confirm" value="reset" required><span>{{ t("settings_reset_confirmation") }}</span></label><button class="btn btn-outline-danger mt-2">{{ t("reset_interface_settings") }}</button></form></div></section></div>
{% endblock %}
