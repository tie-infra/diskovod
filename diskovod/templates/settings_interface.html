{% extends "base.html" %}
{% block content %}
{% include "_settings_nav.html" %}
<section class="card"><div class="card-body"><form method="post" action="/settings/interface" class="form-grid"><label>{{ t("admin_language") }}<select class="form-select" name="locale">{% for code, name in locales.items() %}<option value="{{ code }}" {{ 'selected' if interface_settings.locale == code }}>{{ name }}</option>{% endfor %}</select></label><label>{{ t("theme") }}<select class="form-select" name="theme">{% for theme in ("system","light","dark","black") %}<option value="{{ theme }}" {{ 'selected' if interface_settings.theme == theme }}>{{ t("theme_" ~ theme) }}</option>{% endfor %}</select></label><label>{{ t("density") }}<select class="form-select" name="density"><option value="comfortable" {{ 'selected' if interface_settings.density == 'comfortable' }}>{{ t("comfortable") }}</option><option value="compact" {{ 'selected' if interface_settings.density == 'compact' }}>{{ t("compact") }}</option></select></label><label>{{ t("display_timezone") }}<input class="form-control" name="display_timezone" value="{{ interface_settings.display_timezone }}"></label><label class="form-check full"><input class="form-check-input" type="checkbox" name="show_advanced_ids" {{ 'checked' if interface_settings.show_advanced_ids }}><span>{{ t("show_advanced_ids") }}</span></label><div class="full"><button class="btn btn-primary">{{ t("save") }}</button></div></form></div></section>
{% endblock %}
