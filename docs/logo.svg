<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" role="img" aria-labelledby="title description">
  <title id="title">Diskovod</title>
  <desc id="description">A floppy disk with a chat bubble</desc>
  <defs>
    <path
      id="app-shape"
      d="M69 17h54c36 0 52 16 52 52v54c0 36-16 52-52 52H69c-36 0-52-16-52-52V69c0-36 16-52 52-52Z"
    />
    <linearGradient id="background" x1="57" y1="17" x2="135" y2="175" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8189f7"/>
      <stop offset="1" stop-color="#5662ed"/>
    </linearGradient>
    <linearGradient id="rim-light" x1="96" y1="17" x2="96" y2="175" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff" stop-opacity="0.38"/>
      <stop offset="0.46" stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="rim-shade" x1="96" y1="70" x2="96" y2="175" gradientUnits="userSpaceOnUse">
      <stop stop-color="#242858" stop-opacity="0"/>
      <stop offset="0.68" stop-color="#242858" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#242858" stop-opacity="0.24"/>
    </linearGradient>
    <linearGradient id="disk" x1="63" y1="36" x2="132" y2="162" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff"/>
      <stop offset="0.48" stop-color="#f4f5ff"/>
      <stop offset="1" stop-color="#cfd5ff"/>
    </linearGradient>
    <linearGradient id="disk-rim" x1="96" y1="31" x2="96" y2="167" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff" stop-opacity="0.5"/>
      <stop offset="0.55" stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#6670bd" stop-opacity="0.18"/>
    </linearGradient>
    <linearGradient id="label" x1="70" y1="35" x2="120" y2="83" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7983fa"/>
      <stop offset="0.52" stop-color="#606cf3"/>
      <stop offset="1" stop-color="#4b56cc"/>
    </linearGradient>
    <linearGradient id="label-rim" x1="70" y1="35" x2="120" y2="83" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff" stop-opacity="0.24"/>
      <stop offset="0.52" stop-color="#ffffff" stop-opacity="0.03"/>
      <stop offset="1" stop-color="#3038a6" stop-opacity="0.28"/>
    </linearGradient>
    <linearGradient id="accent" x1="72" y1="91" x2="128" y2="153" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6f7af8"/>
      <stop offset="0.5" stop-color="#5865f2"/>
      <stop offset="1" stop-color="#414bb8"/>
    </linearGradient>
    <linearGradient id="accent-rim" x1="67" y1="96" x2="125" y2="156" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff" stop-opacity="0.24"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.03"/>
      <stop offset="1" stop-color="#252d91" stop-opacity="0.34"/>
    </linearGradient>
    <linearGradient id="recess" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#8f98d5"/>
      <stop offset="0.18" stop-color="#c6cced"/>
      <stop offset="0.48" stop-color="#f4f5fd"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="recess-rim" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#202a82" stop-opacity="0.74"/>
      <stop offset="0.44" stop-color="#5c67b5" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.96"/>
    </linearGradient>
    <filter id="app-shadow" x="1" y="1" width="190" height="197" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="6" stdDeviation="5" flood-color="#1e1f22" flood-opacity="0.34"/>
    </filter>
    <filter id="glyph-shadow" x="18" y="12" width="164" height="200" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8" result="ambient-blur"/>
      <feOffset in="ambient-blur" dy="13" result="ambient-offset"/>
      <feFlood flood-color="#1e1f22" flood-opacity="0.46" result="ambient-color"/>
      <feComposite in="ambient-color" in2="ambient-offset" operator="in" result="ambient-shadow"/>
      <feGaussianBlur in="SourceAlpha" stdDeviation="2.5" result="contact-blur"/>
      <feOffset in="contact-blur" dy="5" result="contact-offset"/>
      <feFlood flood-color="#25284f" flood-opacity="0.4" result="contact-color"/>
      <feComposite in="contact-color" in2="contact-offset" operator="in" result="contact-shadow"/>
      <feMerge>
        <feMergeNode in="ambient-shadow"/>
        <feMergeNode in="contact-shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="bubble-shadow" x="42" y="80" width="116" height="100" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#202225" flood-opacity="0.3"/>
    </filter>
    <filter id="recess-shadow" x="-35%" y="-25%" width="170%" height="155%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="-1.1" stdDeviation="1.35" flood-color="#20266e" flood-opacity="0.52"/>
    </filter>
  </defs>

  <use href="#app-shape" fill="url(#background)" filter="url(#app-shadow)"/>
  <use href="#app-shape" fill="none" stroke="url(#rim-light)" stroke-width="1.5"/>
  <use href="#app-shape" fill="none" stroke="url(#rim-shade)" stroke-width="1.5"/>

  <g transform="translate(14.4 12) scale(0.85)">
    <path
      fill="url(#disk)"
      filter="url(#glyph-shadow)"
      d="M55 31h64a10 10 0 0 1 7 3l18 18a10 10 0 0 1 3 7v98a10 10 0 0 1-10 10H55a10 10 0 0 1-10-10V41a10 10 0 0 1 10-10Z"
    />
    <path
      fill="none"
      stroke="url(#disk-rim)"
      stroke-width="1.4"
      d="M55 31h64a10 10 0 0 1 7 3l18 18a10 10 0 0 1 3 7v98a10 10 0 0 1-10 10H55a10 10 0 0 1-10-10V41a10 10 0 0 1 10-10Z"
    />
    <rect x="68" y="35" width="54" height="48" rx="6" fill="url(#label)" stroke="url(#label-rim)" stroke-width="1.4"/>
    <rect x="105" y="47" width="9" height="24" rx="4.5" fill="url(#recess)" stroke="url(#recess-rim)" stroke-width="1.1" filter="url(#recess-shadow)"/>
    <path
      fill="url(#accent)"
      stroke="url(#accent-rim)"
      stroke-width="1.1"
      filter="url(#bubble-shadow)"
      d="M72 96h48a18 18 0 0 1 18 18v12a18 18 0 0 1-18 18h-11q-2 0-3 2l-7 8q-3 4-6 0l-7-8q-1-2-3-2H72a18 18 0 0 1-18-18v-12a18 18 0 0 1 18-18Z"
    />
    <g filter="url(#recess-shadow)">
      <ellipse cx="82" cy="120" rx="6" ry="7.5" fill="url(#recess)" stroke="url(#recess-rim)" stroke-width="1.25"/>
      <ellipse cx="110" cy="120" rx="6" ry="7.5" fill="url(#recess)" stroke="url(#recess-rim)" stroke-width="1.25"/>
    </g>
  </g>
</svg>
